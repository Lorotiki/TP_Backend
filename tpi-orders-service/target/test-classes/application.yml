spring:
  datasource:
    url: jdbc:h2:mem:orders;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: orders
        hbm2ddl:
          create_namespaces: true
    open-in-view: false

clients:
  market-data:
    base-url: http://localhost:18081
  portfolio:
    base-url: http://localhost:18082
  history:
    base-url: http://localhost:18084

