spring:
  application:
    name: tpi-orders-service
  datasource:
    url: ${ORDERS_DB_URL:jdbc:postgresql://localhost:5434/orders_db}
    username: ${ORDERS_DB_USER:postgres}
    password: ${ORDERS_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: orders
        jdbc:
          time_zone: UTC
    open-in-view: false

server:
  port: 8083

clients:
  market-data:
    base-url: ${MARKET_DATA_BASE_URL:http://localhost:8081}
  portfolio:
    base-url: ${PORTFOLIO_BASE_URL:http://localhost:8082}
  history:
    base-url: ${HISTORY_BASE_URL:http://localhost:8084}

