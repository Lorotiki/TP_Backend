spring:
  application:
    name: tpi-orders-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stockmarket}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false

server:
  port: 8083

clients:
  market-data:
    base-url: ${MARKET_DATA_BASE_URL:http://market-data-service:8081}
  portfolio:
    base-url: ${PORTFOLIO_BASE_URL:http://portfolio-service:8082}
  history:
    base-url: ${HISTORY_BASE_URL:http://history-service:8084}

