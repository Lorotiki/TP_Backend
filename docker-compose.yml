services:

  postgres:
    image: postgres:15
    init: true
    stop_grace_period: 30s
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: stockmarket
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init/01-db-keycloak.sql:/docker-entrypoint-initdb.d/01-db-keycloak.sql:ro
      - ./db-init/init.sql:/docker-entrypoint-initdb.d/02-stockmarket.sql:ro
    networks:
      - tpi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d stockmarket"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    init: true
    stop_grace_period: 30s
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: admin
      KC_DB_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME: localhost
      KEYCLOAK_LOGLEVEL: INFO
    ports:
      - "8180:8080"
    volumes:
      - ./tpi-keycloak-config/realm/tpi-realm-base.json:/opt/keycloak/data/import/tpi-realm-base.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tpi-network
    restart: on-failure

  market-data-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: tpi-market-data-service
    init: true
    stop_grace_period: 30s
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
    networks:
      - tpi-network
    restart: on-failure

  portfolio-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: tpi-portfolio-service
    init: true
    stop_grace_period: 30s
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stockmarket
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      - postgres
      - keycloak
    networks:
      - tpi-network
    restart: on-failure

  orders-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: tpi-orders-service
    init: true
    stop_grace_period: 30s
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stockmarket
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      - postgres
      - keycloak
    networks:
      - tpi-network
    restart: on-failure

  history-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: tpi-history-service
    init: true
    stop_grace_period: 30s
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stockmarket
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      - postgres
      - keycloak
    networks:
      - tpi-network
    restart: on-failure

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: tpi-api-gateway
    init: true
    stop_grace_period: 30s
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8180/realms/tpi
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/tpi/protocol/openid-connect/certs
      SERVICES_URI_MARKET-DATA: http://market-data-service:8081
      SERVICES_URI_PORTFOLIO: http://portfolio-service:8082
      SERVICES_URI_ORDERS: http://orders-service:8083
      SERVICES_URI_HISTORY: http://history-service:8084
    depends_on:
      - keycloak
      - market-data-service
      - portfolio-service
      - orders-service
      - history-service
    networks:
      - tpi-network
    restart: on-failure

networks:
  tpi-network:
    driver: bridge

volumes:
  postgres_data:
