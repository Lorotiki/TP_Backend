spring:
  application:
    name: tpi-api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/tpi}
  cloud:
    gateway:
      routes:
        - id: market-data
          uri: ${MARKET_DATA_URI:http://localhost:8081}
          predicates:
            - Path=/quotes/**
        - id: portfolio
          uri: ${PORTFOLIO_URI:http://localhost:8082}
          predicates:
            - Path=/users/*/portfolio,/users/*/deposits,/users/*/portfolio/trades
        - id: orders
          uri: ${ORDERS_URI:http://localhost:8083}
          predicates:
            - Path=/orders/**,/users/*/orders
        - id: history
          uri: ${HISTORY_URI:http://localhost:8084}
          predicates:
            - Path=/events,/users/*/history,/admin/history

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health,info

