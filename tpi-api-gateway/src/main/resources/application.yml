spring:
  application:
    name: tpi-api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/tpi}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/tpi}/protocol/openid-connect/certs}
  cloud:
    gateway:
      routes:
        - id: market-data
          uri: ${MARKET_DATA_URI:http://market-data-service:8081}
          predicates:
            - Path=/quotes/**
        - id: portfolio
          uri: ${PORTFOLIO_URI:http://portfolio-service:8082}
          predicates:
            - Path=/users/*/portfolio,/users/*/deposits,/users/*/trades
        - id: orders
          uri: ${ORDERS_URI:http://orders-service:8083}
          predicates:
            - Path=/orders/**,/users/*/orders
        - id: history
          uri: ${HISTORY_URI:http://history-service:8084}
          predicates:
            - Path=/events,/users/*/history,/admin/history

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  keycloak:
    client-id: ${KEYCLOAK_CLIENT_ID:tpi-backend-client}
    redirect-uri: ${KEYCLOAK_REDIRECT_URI:http://localhost:8085/api/login/oauth2/code/keycloak}

