spring:
  application:
    name: tpi-portfolio-service
  datasource:
    url: ${PORTFOLIO_DB_URL:jdbc:postgresql://localhost:5433/portfolio_db}
    username: ${PORTFOLIO_DB_USER:postgres}
    password: ${PORTFOLIO_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: portfolio
        jdbc:
          time_zone: UTC
    open-in-view: false

server:
  port: 8082

